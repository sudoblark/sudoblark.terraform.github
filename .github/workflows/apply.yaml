name: Terraform apply

env:
  # Explicitly provided token in ORG to access entire organisation
  GITHUB_TOKEN: ${{ secrets.SUDOBLARK_GITHUB_TOKEN }}

on:
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * *
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - 'LICENSE.txt'


permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  apply:
    name: Terraform apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::741139166799:role/service-accounts/aws-sudoblark-management-github-cicd-role
          aws-region: eu-west-2

      - name: terraform apply
        uses: dflook/terraform-apply@v1
        with:
          auto_approve: true
